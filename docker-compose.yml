services:
  minfo:
    build: .
    mem_limit: "1g"
    privileged: true
    ports:
      - "28081:8080"
    environment:
      MONO_GC_PARAMS: "soft-heap-limit=768m,nursery-size=64m"
      PORT: "8080"
      WEB_PASSWORD: "adminadmin"
    volumes:
      - /home/mirrorb/qbittorrent/Downloads:/media:ro
